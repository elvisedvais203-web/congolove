name: Quality Gate

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Shared build
        run: npm run build:shared

      - name: Backend type check
        run: npm --workspace @nextalk/backend run lint

      - name: Frontend type check
        run: npm --workspace @nextalk/frontend run lint

      - name: Backend build
        run: npm run build:backend

      - name: Frontend build
        run: npm run build:frontend
