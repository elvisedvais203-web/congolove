services:
  - type: web
    name: congolove-api
    runtime: node
    plan: starter
    rootDir: .
    buildCommand: npm install --include=dev && npm run build --workspace @kongo-love/backend
    startCommand: npm run start:render --workspace @kongo-love/backend
    healthCheckPath: /api/ready
    envVars:
      - key: NODE_ENV
        value: production
      - key: API_PORT
        value: 10000
      - key: API_BASE_URL
        sync: false
      - key: CORS_ORIGIN
        value: "https://app.congolove.com"
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: MEDIA_PROVIDER
        value: cloudinary
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: JWT_ACCESS_TTL
        value: 15m
      - key: JWT_REFRESH_TTL
        value: 30d
      - key: DEBUG_ERRORS
        value: "false"
      - key: PAYMENT_WEBHOOK_SECRET
        sync: false
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_CLIENT_EMAIL
        sync: false
      - key: FIREBASE_PRIVATE_KEY
        sync: false
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: SUPERADMIN_EMAIL
        sync: false
      - key: SUPERADMIN_PHONE
        sync: false
      - key: SUPERADMIN_PASSWORD
        sync: false

  - type: web
    name: congolove-web
    runtime: node
    plan: starter
    rootDir: .
    buildCommand: npm install --include=dev && npm run build --workspace @kongo-love/frontend
    startCommand: npm run start --workspace @kongo-love/frontend
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: NEXT_PUBLIC_API_URL
        sync: false
      - key: NEXT_PUBLIC_SOCKET_URL
        sync: false
      - key: NEXT_PUBLIC_FIREBASE_API_KEY
        sync: false
      - key: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
        sync: false
      - key: NEXT_PUBLIC_FIREBASE_PROJECT_ID
        sync: false
      - key: NEXT_PUBLIC_FIREBASE_APP_ID
        sync: false
      - key: NEXT_PUBLIC_FIREBASE_AUTH_DISABLE_APP_VERIFICATION
        value: "false"
